<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bavaria S.A. - Reportes</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <!-- Menú de Navegación Lateral -->
    <nav class="sidebar">
        <div class="sidebar-brand">BAVARIA S.A.</div>
        <ul class="sidebar-menu">
            <li><a href="login.html">Inicio</a></li>
          <li><a href="productos.html">Productos</a></li>
          <li><a href="inventario.html">Inventario</a></li>
          <li><a href="pedidos.html">Pedidos</a></li>
          <li><a href="clientes.html">Clientes</a></li>
          <li><a href="facturacion.html">Facturación</a></li>
          <li><a href="reportes.html">Reportes</a></li>
          <li><a href="index.html">Cerrar sesion</a></li>
        </ul>
    </nav>

    <!-- Área de Trabajo de Gráficas -->
    <main class="main-content">
        <header class="topbar">
            <div><strong>Sistema de Gestión</strong></div>
            <div>Administrador 👤</div>
        </header>

        <section class="module-container">
            <h1 class="module-title">Reportes</h1>

            <!-- Panel de Filtrado Técnico -->
            <div class="filter-panel">
                <div class="filter-inputs">
                    <div class="form-field select-type">
                        <label>Tipo de reporte</label>
                        <select>
                            <option>Ventas</option>
                            <option>Inventario de Stock</option>
                            <option>Pedidos procesados</option>
                        </select>
                    </div>
                    <div class="form-field date-input">
                        <label>Fecha Inicio</label>
                        <input type="date" value="2026-05-01">
                    </div>
                    <div class="form-field date-input">
                        <label>Fecha Fin</label>
                        <input type="date" value="2026-05-20">
                    </div>
                </div>
                <button class="btn-generate">Generar reporte</button>
            </div>

            <!-- Panel Central del Gráfico -->
            <div class="chart-section">
                <div class="chart-title">Ventas por día</div>
                
                <div class="chart-container">
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar" style="height: 60px;" data-value="20M"></div>
                        <div class="chart-label">01/05</div>
                    </div>
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar" style="height: 110px;" data-value="40M"></div>
                        <div class="chart-label">05/05</div>
                    </div>
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar" style="height: 165px;" data-value="60M"></div>
                        <div class="chart-label">10/05</div>
                    </div>
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar" style="height: 85px;" data-value="30M"></div>
                        <div class="chart-label">15/05</div>
                    </div>
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar" style="height: 140px;" data-value="50M"></div>
                        <div class="chart-label">20/05</div>
                    </div>
                </div>
            </div>

            <!-- Botones de Salida de Archivos -->
            <div class="export-footer">
                <button class="btn-export btn-pdf">Exportar a PDF</button>
                <button class="btn-export btn-excel">Exportar a Excel</button>
            </div>
        </section>
    </main>

</body>
</html>
