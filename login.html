<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bavaria S.A. - Inicio de Sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f4f6f9;
        }

        /* Contenedor Izquierdo - Azul Imagen Corporativa */
        .left-panel {
            flex: 1;
            background-color: #0b2240;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        .logo-placeholder {
            font-size: 5rem;
            margin-bottom: 10px;
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .slogan {
            font-size: 1.2rem;
            color: #a3b8cc;
            font-weight: 300;
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #627d98;
        }

        /* Contenedor Derecho - Formulario Blanco */
        .right-panel {
            flex: 1;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-box {
            width: 100%;
            max-width: 360px;
        }

        .login-box h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group span {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            background-color: #f8fafc;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #0b2240;
            background-color: white;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #ffbc00;
            border: none;
            border-radius: 6px;
            color: #0b2240;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            background-color: #e0a500;
        }

        .forgot-password {
            text-align: center;
        }

        .forgot-password a {
            color: #0066cc;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Panel de Marca (Izquierdo) -->
<div class="left-panel">
    <div class="logo-placeholder">
        <img src="logo bavaria.jpg"  style="max-height: 80%; max-width: 90%; object-fit: contain;">
    </div>
    <div class="brand-name">BAVARIA</div>
    <div class="slogan">Soñar en grande para crear un futuro con más motivos para brindar</div>
    <div class="footer-text">© 2026 Bavaria S.A. Todos los derechos reservados.</div>
</div>


    <!-- Panel de Acceso (Derecho) -->
    <div class="right-panel">
        <div class="login-box">
            <h2>Iniciar sesión</h2>
            
            <form action="#">
                <div class="input-group">
                    <span>👤</span>
                    <input type="text" placeholder="Usuario" required>
                </div>
                
                <div class="input-group">
                    <span>🔒</span>
                    <input type="password" placeholder="Contraseña" required>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label id="remember">Recordar usuario</label>
                </div>

                <button type="submit" class="btn-login">Iniciar sesión</button>

                <div class="forgot-password">
                    <a href="#">¿Olvidó su contraseña?</a>
                    <span class="divider">|</span>
                    <a href="#" class="create-account">Crear usuario</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>


<!-- Contenido de la página -->

<div id="toast"></div>

<script src="js/app.js"></script>

</body>
</html>
